# backend/src/main/resources/application.properties
# Spring Boot Application Configuration with XAMPP MySQL

# ============================================================
# APPLICATION METADATA
# ============================================================
spring.application.name=chess-backend
spring.profiles.active=dev

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# ============================================================
# MYSQL DATABASE CONFIGURATION (XAMPP)
# ============================================================
# XAMPP MySQL Connection Details
# Use environment variables for production: ${DB_URL}, ${DB_USERNAME}, ${DB_PASSWORD}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chess_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=5000

# ============================================================
# JPA CONFIGURATION
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging.level.root=INFO
logging.level.com.chess=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.websocket=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/chess-backend.log
logging.file.max-size=10MB
logging.file.max-history=10

# ============================================================
# JACKSON (JSON) CONFIGURATION
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false

# ============================================================
# OPTIONAL API KEY (production hardening)
# ============================================================
# When non-empty, clients must send header: X-API-Key: <value> for /api/** (except /api/health, /api/test).
# Leave empty for local development.
security.api-key=${SECURITY_API_KEY:}

# ============================================================
# SECURITY (OPTIONAL JWT)
# ============================================================
# Use environment variable for production: ${JWT_SECRET}
security.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-12345}
security.jwt.expiration=86400000

# ============================================================
# WEBSOCKET CONFIGURATION
# ============================================================
spring.websocket.message.size.max=65536
spring.websocket.handler.timeout=60000

# ============================================================
# STOCKFISH CONFIGURATION
# ============================================================
# Use environment variable for custom path: ${STOCKFISH_PATH}
stockfish.path=${STOCKFISH_PATH:C:/Program Files/stockfish-windows-x86-64-avx2/stockfish/stockfish-windows-x86-64-avx2.exe}
# For Linux: STOCKFISH_PATH=/usr/games/stockfish
# For custom Windows path, set environment variable: STOCKFISH_PATH=C:\\path\\to\\stockfish.exe

# ============================================================
# CORS CONFIGURATION
# ============================================================
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ============================================================
# MULTIPART FILE UPLOAD
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# ACTUATOR (MONITORING)
# ============================================================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# ============================================================
# DEVELOPMENT/PRODUCTION PROFILES
# ============================================================
# For production, set: spring.profiles.active=production
# Create application-production.properties for production settings