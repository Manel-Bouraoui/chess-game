spring.application.name=chess-backend-test

spring.datasource.url=jdbc:h2:mem:chess_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

logging.level.root=WARN
logging.level.com.chess=INFO

# Disable optional API key in tests
security.api-key=
